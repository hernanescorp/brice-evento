<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evento Brice</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F6E9D9;
      color: #043222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: #F6E9D9;
      border: 1px solid #043222;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #043222;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #043222;
      color: #F6E9D9;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Evento Brice 🚀</h1>
  <p>Reserva tu plaza rellenando el formulario</p>

  <form id="form">
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="mensaje" placeholder="Mensaje"></textarea>
    <button type="submit">Enviar</button>
  </form>

  <div id="status"></div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("status").innerText = "Formulario enviado (aún sin backend)";
});
</script>

</body>
</html>
