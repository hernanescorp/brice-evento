<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Evento Brice</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
  color: #043222;
}

/* 🔥 HERO (IMAGEN COMPLETA) */
.hero {
  height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
    url("assets/images/backgrounds/brice.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #F6E9D9;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 2.8rem;
  font-weight: 900;
  margin-bottom: 15px;
}

.hero p {
  margin-bottom: 25px;
  font-size: 1.2rem;
}

.hero button {
  padding: 14px 28px;
  background: #F6E9D9;
  color: #043222;
  border: none;
  border-radius: 12px;
  font-weight: 800;
  cursor: pointer;
}

/* FORM SECTION */
.form-section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  background: #043222;
}

/* FORM CARD */
.container {
  width: 100%;
  max-width: 540px;
  background: rgba(246, 233, 217, 0.95);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.5);
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(50px); }
  to { opacity:1; transform: translateY(0); }
}

/* LOGO */
.logo-container {
  text-align: center;
  margin-bottom: 20px;
}

.logo-container img {
  max-width: 130px;
}

/* TEXT */
h2 {
  text-align: center;
  margin-bottom: 10px;
  font-weight: 900;
}

.subtitle {
  text-align: center;
  margin-bottom: 25px;
}

/* FORM */
.form-group { margin-bottom: 15px; }

label {
  font-weight: 700;
  font-size: 0.9rem;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #043222;
}

.row {
  display: flex;
  gap: 10px;
}

.row .form-group { flex:1; }

button.submit {
  width: 100%;
  padding: 14px;
  background: #043222;
  color: #F6E9D9;
  border: none;
  border-radius: 10px;
  font-weight: 800;
  margin-top: 10px;
}

#status {
  margin-top: 10px;
  display: none;
  text-align:center;
}

@media(max-width:600px){
  .row { flex-direction: column; }
}
</style>
</head>

<body>

<!-- 🔥 HERO -->
<section class="hero">
  <h1>Intensivo 2 días con Brice</h1>
  <p>Plazas limitadas</p>
  <button onclick="scrollToForm()">Reservar plaza</button>
</section>

<!-- FORM -->
<section class="form-section" id="formSection">
  <div class="container">

    <div class="logo-container">
      <img src="assets/images/logos/logo.jpg">
    </div>

    <h2>Reserva tu plaza</h2>
    <p class="subtitle">Completa el formulario</p>

    <form id="form">

      <div class="row">
        <div class="form-group">
          <label>Nombre</label>
          <input id="nombre" required>
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input id="apellido" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="email" required>
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input id="telefono">
      </div>

      <div class="row">
        <div class="form-group">
          <label>País nacimiento</label>
          <input id="paisNacimiento" required>
        </div>
        <div class="form-group">
          <label>Edad</label>
          <input id="edad" type="number" required>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Ciudad</label>
          <input id="ciudadResidencia" required>
        </div>
        <div class="form-group">
          <label>País</label>
          <input id="paisResidencia" required>
        </div>
      </div>

      <button class="submit" type="submit">Reservar</button>

    </form>

    <div id="status"></div>
  </div>
</section>

<script>
function scrollToForm() {
  document.getElementById("formSection").scrollIntoView({ behavior: "smooth" });
}

const form = document.getElementById("form");
const status = document.getElementById("status");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  status.style.display = "block";
  status.innerText = "Enviando...";

  const data = {
    nombre: nombre.value,
    apellido: apellido.value,
    email: email.value,
    telefono: telefono.value,
    paisNacimiento: paisNacimiento.value,
    edad: edad.value,
    ciudadResidencia: ciudadResidencia.value,
    paisResidencia: paisResidencia.value
  };

  const res = await fetch("/api/contacto", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  if(res.ok){
    status.innerText = "Reserva enviada";
    form.reset();
  } else {
    status.innerText = "Error";
  }
});
</script>

</body>
</html>
