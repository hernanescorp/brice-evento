<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evento Brice</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #043222 0%, #043222 45%, #F6E9D9 45%, #F6E9D9 100%);
      color: #043222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #F6E9D9;
      border: 2px solid #043222;
      border-radius: 20px;
      padding: 45px 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
      position: relative;
    }

    /* LOGO */
    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-container img {
      max-width: 140px;
      height: auto;
      object-fit: contain;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      margin-bottom: 30px;
      font-size: 1rem;
      opacity: 0.85;
      padding-bottom: 20px;
      border-bottom: 1.5px solid #043222;
    }

    form {
      text-align: left;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 13px;
      border: 2px solid #043222;
      border-radius: 10px;
      background: transparent;
      color: #043222;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group {
      flex: 1;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #043222;
      color: #F6E9D9;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    #status {
      margin-top: 15px;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }

    #status.success {
      display: block;
      background: #043222;
      color: #F6E9D9;
    }

    #status.error {
      display: block;
      border: 2px solid #043222;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-container">
    <img src="assets/images/logos/logo.jpg" alt="Logo Brice">
  </div>

  <h1>Evento Brice</h1>
  <p class="subtitle">Reserva tu plaza</p>

  <form id="form">

    <div class="row">
      <div class="form-group">
        <label>Nombre</label>
        <input id="nombre" required>
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input id="apellido" required>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" required>
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input id="telefono">
    </div>

    <div class="form-group">
      <label>Asistentes</label>
      <select id="asistentes">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>

    <div class="form-group">
      <label>Mensaje</label>
      <textarea id="mensaje"></textarea>
    </div>

    <button type="submit">Reservar</button>

  </form>

  <div id="status"></div>
</div>

<script>
  const form = document.getElementById("form");
  const status = document.getElementById("status");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    status.style.display = "block";
    status.className = "";
    status.innerText = "Enviando...";

    const data = {
      nombre: document.getElementById("nombre").value.trim(),
      apellido: document.getElementById("apellido").value.trim(),
      email: document.getElementById("email").value.trim(),
      telefono: document.getElementById("telefono").value.trim(),
      asistentes: document.getElementById("asistentes").value,
      mensaje: document.getElementById("mensaje").value.trim()
    };

    try {
      const res = await fetch("/api/contacto", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (res.ok) {
        status.className = "success";
        status.innerText = "Reserva enviada correctamente";
        form.reset();
      } else {
        status.className = "error";
        status.innerText = result.error || "Error al enviar";
      }

    } catch (err) {
      status.className = "error";
      status.innerText = "Error de conexión";
    }
  });
</script>

</body>
</html>
